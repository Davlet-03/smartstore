<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStore - Заказать консультацию</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/custom.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<!-- ====================== ШАПКА ====================== -->
<!-- ====================== ШАПКА (ТОЧНО КАК НА ТВОЁМ СКРИНШОТЕ) ====================== -->
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3">
        <div class="container">
            
            <!-- Логотип слева в чёрном квадрате -->
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="SmartStore" height="54">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto align-items-center gap-4">
                    <li class="nav-item"><a class="nav-link fw-medium" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="catalog.html">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="consultation.html">Контакты</a></li>
                </ul>

                <!-- Кнопка Профиль - точно как на скриншоте -->
                <a href="#" class="btn btn-profile">Профиль</a>
            </div>
        </div>
    </nav>
</header>

<!-- ====================== ФОРМА ====================== -->
<section class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="consult-card bg-white p-5 rounded-4 shadow">
                    <h1 class="text-center fw-bold mb-4">Заказать консультацию</h1>
                    <p class="text-center text-muted mb-5">Наш специалист перезвонит вам в течение 15 минут</p>
                    
                    <form action="#" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Ваше имя</label>
                                <input type="text" class="form-control form-control-lg" placeholder="Иван Иванов" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Телефон</label>
                                <input type="tel" class="form-control form-control-lg" placeholder="+7 (___) ___-__-__" required>
                            </div>
                        </div>
                        
                        <div class="mb-3 mt-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control form-control-lg" placeholder="qwerty@gmail.com" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Интересующая модель</label>
                            <select class="form-select form-select-lg">
                                <option value="">Выберите модель...</option>
                                <option>iPhone 17 Pro</option>
                                <option>Samsung S25 Ultra</option>
                                <option>Xiaomi 15 Pro</option>
                                <option>Huawei Pura 70</option>
                                <option>Другая</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-green w-100 py-3">Отправить заявку</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ====================== ФУТЕР ====================== -->
<footer class="bg-dark text-white py-5">
    <div class="container">
        <div class="row text-center text-md-start">
            <div class="col-md-3 mb-4">
                <img src="images/logo.png" alt="SmartStore" height="48">
            </div>
            <div class="col-md-3 mb-4">
                <h5 class="fw-bold">Информация</h5>
                <ul class="list-unstyled">
                    <li><a href="#" class="text-white text-decoration-none">О компании</a></li>
                    <li><a href="#" class="text-white text-decoration-none">Вакансии</a></li>
                </ul>
            </div>
            <div class="col-md-3 mb-4">
                <h5 class="fw-bold">Покупателям</h5>
                <ul class="list-unstyled">
                    <li><a href="#" class="text-white text-decoration-none">Доставка</a></li>
                    <li><a href="#" class="text-white text-decoration-none">Способы оплаты</a></li>
                    <li><a href="#" class="text-white text-decoration-none">Обмен и возврат</a></li>
                </ul>
            </div>
            <div class="col-md-3 mb-4">
                <h5 class="fw-bold">Обратная связь</h5>
                <ul class="list-unstyled">
                    <li><a href="consultation.html" class="text-white text-decoration-none">Заказать консультацию</a></li>
                </ul>
            </div>
        </div>
        <div class="text-center mt-5 pt-4 border-top border-secondary">
            © 2026 SmartStore. Все права защищены.
        </div>
    </div>
</footer>

<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
